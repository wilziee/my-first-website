<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaerisoft | NGL Web Auto Sender</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');

        :root { 
            --bg: #05050A; 
            --primary: #8B5CF6; 
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(139, 92, 246, 0.3);
            --success: #4ADE80;
            --error: #F87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: var(--bg); color: white; 
            font-family: 'Space Grotesk', sans-serif; 
            min-height: 100vh; display: flex; 
            align-items: center; justify-content: center; 
            overflow: hidden; 
        }

        /* Background Effects */
        .noise-bg { position: fixed; inset: 0; background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E'); z-index: -1; pointer-events: none; }
        .aurora-bg { position: fixed; width: 200%; height: 200%; background: radial-gradient(circle, rgba(109, 40, 217, 0.15), transparent 40%); animation: auroraMove 20s infinite alternate ease-in-out; z-index: -2; pointer-events: none; }
        @keyframes auroraMove { 0% { transform: translate(-25%, -25%) rotate(0deg); } 100% { transform: translate(-25%, -25%) rotate(15deg); } }
        canvas { position: fixed; inset: 0; z-index: -3; pointer-events: none;}

        /* UI Card */
        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); 
            border-radius: 20px; padding: 40px; 
            width: 90%; max-width: 450px; 
            box-shadow: 0 8px 32px 0 rgba(139, 92, 246, 0.2); 
            position: relative; z-index: 10;
        }

        .header { text-align: center; margin-bottom: 25px; }
        h1 { font-size: 2rem; margin-bottom: 5px; }
        h1 span { color: var(--primary); }
        p.desc { color: #aaa; font-size: 0.9rem; }

        /* Form Controls */
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: #ccc; margin-bottom: 8px; font-weight: 600; }
        
        input, textarea, select {
            width: 100%; background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; padding: 12px 15px; 
            color: white; font-family: inherit; 
            outline: none; transition: 0.3s; font-size: 0.95rem;
        }
        textarea { height: 100px; resize: none; }
        input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
        select option { background: #111; color: white; }

        /* Button & Status */
        .btn { 
            width: 100%; padding: 14px; margin-top: 10px;
            background: rgba(139, 92, 246, 0.2); 
            border: 1px solid var(--primary); 
            border-radius: 12px; color: white; 
            font-weight: bold; font-size: 1rem;
            cursor: pointer; transition: 0.3s; 
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn:hover:not(:disabled) { background: var(--primary); box-shadow: 0 0 20px rgba(139, 92, 246, 0.4); transform: translateY(-2px); }
        .btn:disabled { background: #222; border-color: #444; color: #777; cursor: not-allowed; }

        #status-box {
            margin-top: 15px; padding: 12px;
            border-radius: 10px; font-size: 0.85rem;
            text-align: center; display: none; font-weight: 600;
        }
        .status-loading { background: rgba(255, 255, 255, 0.1); border: 1px solid #aaa; color: #fff; }
        .status-success { background: rgba(74, 222, 128, 0.1); border: 1px solid var(--success); color: var(--success); }
        .status-error { background: rgba(248, 113, 113, 0.1); border: 1px solid var(--error); color: var(--error); }
    </style>
</head>
<body>
    <div class="noise-bg"></div>
    <div class="aurora-bg"></div>
    <canvas id="universe-canvas"></canvas>

    <main class="container">
        <div class="glass-card">
            <div class="header">
                <h1>Xaerisoft <span>NGL</span></h1>
                <p class="desc">Web Auto Sender (Proxy Rotator)</p>
            </div>
            
            <div class="input-group">
                <label>Target Username</label>
                <input type="text" id="ngl-target" placeholder="Username target..." required>
            </div>

            <div class="input-group">
                <label>Message Content</label>
                <textarea id="message" placeholder="Type your message here..." required></textarea>
            </div>

            <div class="input-group">
                <label>Send Count</label>
                <select id="send-count">
                    <option value="1">Send 1 Time</option>
                    <option value="2">Send 2 Times</option>
                    <option value="3">Send 3 Times (Max)</option>
                </select>
            </div>
            
            <button id="send-btn" class="btn">
                <span>Deploy Message</span> 🚀
            </button>

            <div id="status-box">Status will appear here.</div>
        </div>
    </main>

    <script>
        // ==========================================
        // BACKGROUND ANIMATION
        // ==========================================
        const canvas = document.getElementById('universe-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, stars = [];

        function initStars() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = Array.from({length: Math.floor((w*h)/1500)}, () => ({
                x: Math.random() * w, y: Math.random() * h,
                r: Math.random() * 1.5, speed: (Math.random() * 0.3) + 0.05, alpha: Math.random()
            }));
        }

        function animateStars() {
            ctx.clearRect(0, 0, w, h);
            stars.forEach(s => {
                s.y -= s.speed; if(s.y < 0) s.y = h;
                ctx.globalAlpha = s.alpha; ctx.fillStyle = '#FFFFFF';
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animateStars);
        }
        window.addEventListener('resize', initStars);
        initStars(); animateStars();

        // ==========================================
        // NGL SENDER LOGIC (PROXY ROTATOR)
        // ==========================================
        const btn = document.getElementById('send-btn');
        const statusBox = document.getElementById('status-box');
        const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function showStatus(text, type) {
            statusBox.style.display = 'block';
            statusBox.className = '';
            statusBox.classList.add(`status-${type}`);
            statusBox.innerHTML = text;
        }

        // List proxy untuk bypass CORS (Jika 1 gagal, lanjut ke proxy 2)
        const PROXIES = [
            "https://corsproxy.io/?",
            "https://api.allorigins.win/raw?url="
        ];

        async function sendPesan(username, message) {
            const url = 'https://ngl.link/api/submit';
            
            const payload = new URLSearchParams({
                username: username,
                question: message,
                deviceId: generateUUID(),
                gameSlug: 'pro',
                referrer: ''
            });

            for (let proxy of PROXIES) {
                try {
                    const fullUrl = proxy + encodeURIComponent(url);
                    const response = await fetch(fullUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded'
                        },
                        body: payload.toString()
                    });

                    if (response.ok) {
                        return true; 
                    }
                } catch (e) {
                    console.log(`Proxy ${proxy} gagal, mencoba proxy selanjutnya...`);
                }
            }
            return false;
        }

        btn.addEventListener('click', async () => {
            const targetInput = document.getElementById('ngl-target').value.trim();
            const message = document.getElementById('message').value.trim();
            const count = parseInt(document.getElementById('send-count').value);

            if(!targetInput || !message) {
                showStatus('Target dan Pesan wajib diisi!', 'error');
                return;
            }

            // Bersihkan input target (kalau user masukin link, kita ambil usernamenya aja)
            let username = targetInput.split('/').pop().split('?')[0];

            btn.disabled = true;
            btn.innerHTML = 'Connecting... ⏳';

            let successCount = 0;

            for (let i = 1; i <= count; i++) {
                showStatus(`Mengirim pesan ${i} dari ${count}...`, 'loading');
                
                const isSuccess = await sendPesan(username, message);
                
                if (isSuccess) {
                    successCount++;
                    showStatus(`Pesan ${i} berhasil terkirim! ✅`, 'success');
                } else {
                    showStatus(`Pesan ${i} gagal terkirim (Terblokir Server).`, 'error');
                }

                if (i < count) {
                    await delay(3000); // Jeda 3 detik
                }
            }

            btn.innerHTML = 'Deploy Message 🚀';
            btn.disabled = false;

            if (successCount > 0) {
                showStatus(`Selesai! ${successCount} pesan berhasil dikirim. 🎉`, 'success');
            } else {
                showStatus(`Gagal mengirim. Keamanan NGL sedang sangat ketat.`, 'error');
            }
        });
    </script>
</body>
</html>
